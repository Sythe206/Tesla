<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tesla</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Hanuman:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <header class="flex space-between">
        <div class="teslaLogoContainer flex align-center justify-center">
          <img src="./images/teslaLogo.png" alt="teslaLogo" class="teslaLogo" />
        </div>
        <div class="headerTextContainer flex align-center space-between">
          <span class="headerText">Vehicles</span>
          <span class="headerText">Emergy</span>
          <span class="headerText">Charging</span>
          <span class="headerText">Discover</span>
          <span class="headerText">Shop</span>
        </div>
        <div class="headerIconsContainer flex align-center justify-center">
          <span class="headerIcon"
            ><img src="./images/iconButton.png" alt="icon1"
          /></span>
          <span class="headerIcon"
            ><img src="./images/iconButton (1).png" alt="icon2"
          /></span>
          <span class="headerIcon"
            ><img src="./images/iconButton (2).png" alt="icon3"
          /></span>
        </div>
      </header>
      <section>
        <video
          src="./images/modelY.mp4"
          width="100%"
          autoplay
          muted
          loop
        ></video>
      </section>
    </main>
  </body>
</html>
